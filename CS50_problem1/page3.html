<!DOCTYPE html>
<html lang="en">
    <head>
        <link rel = "stylesheet" href= "search.css">
        <title>Advanced Search</title>
    </head>
    <body>
        <a class = "link" href = "index.html">back</a>
        <form action="https://www.google.com/search">
            <h2 style ="color:lightgrey; font-size:40px;">Google</h2>
            <hr>
            <h2 style = "color:lightgrey; font-size: 35px">Advanced Search</h2>
            <table>
                <thead>
                    <th style ="text-align:left; font-size: 25px; color:lightgrey;">Find pages with</th>
                </thead>
                <tbody>
                <tr>
                    <td>all of these words:</td>
                    <td><input type = "text" name = "as_q" class = "advanced_search"></td>
                </tr>
                <tr>
                    <td>this exact word or phrase:</td>
                    <td><input type = "text" name = "as_epq" class = "advanced_search"></td>
                </tr>
                <tr>
                    <td>any of these words:</td>
                    <td><input type = "text" name = "as_oq" class = "advanced_search"></td>
                </tr>
                <tr>
                    <td>none of these words:</td>
                    <td><input type = "text" name = "as_eq" class = "advanced_search"></td>
                </tr>
                </tbody>
            </table>
            <input type="submit" value="Search">
        </form>
        </div>
    </body>
</html>
